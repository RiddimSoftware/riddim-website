name: CI
on:
  pull_request:
    branches: [main]
  merge_group:
permissions:
  contents: read
jobs:
  pr-build:
    name: pr-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Install Chromium for audits
        run: npx playwright install --with-deps chromium

      - name: Validate generated site
        run: npm run validate

      - name: Check deploy scripts
        run: bash -n scripts/build_artifact.sh scripts/upload_artifact.sh scripts/deploy_artifact.sh scripts/smoke_check.sh

      - name: Lighthouse and accessibility audits
        run: npm run audit:ci

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-audit-artifacts
          path: |
            artifacts/**
            .lighthouseci/**
          if-no-files-found: warn
