name: Website Promote

on:
  pull_request:
    types: [closed]

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  resolve-artifact:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository }}
    name: Resolve approved preview
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_LINUX || '["ubuntu-latest"]') }}
    outputs:
      artifact_name: ${{ steps.vars.outputs.artifact_name }}
      preview_branch: ${{ steps.vars.outputs.preview_branch }}
      preview_run_id: ${{ steps.find-run.outputs.preview_run_id }}
      preview_url: ${{ steps.vars.outputs.preview_url }}
    steps:
      - name: Resolve promotion settings
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          preview_branch="pr-${{ github.event.pull_request.number }}"
          {
            echo "artifact_name=website-preview-pr-${{ github.event.pull_request.number }}"
            echo "preview_branch=${preview_branch}"
            echo "preview_url=https://${preview_branch}.${{ vars.AMPLIFY_APP_ID }}.amplifyapp.com/"
          } >> "$GITHUB_OUTPUT"

      - name: Check out production branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify preview commit is on production branch
        shell: bash
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "${{ github.event.pull_request.head.sha }}" HEAD; then
            echo "::error::Preview commit ${{ github.event.pull_request.head.sha }} is not an ancestor of main."
            echo "::error::Merge the PR without losing the previewed commit before promoting."
            exit 1
          fi

      - name: Find matching preview run
        id: find-run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "website-preview.yml" \
            --event pull_request \
            --limit 100 \
            --json databaseId,headSha,conclusion,status \
            --jq '.[] | select(.headSha == "${{ github.event.pull_request.head.sha }}" and .status == "completed" and .conclusion == "success") | .databaseId' \
            | head -1)"

          if [[ -z "$run_id" ]]; then
            echo "::error::No successful preview artifact found for commit ${{ github.event.pull_request.head.sha }}."
            exit 1
          fi

          echo "preview_run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Promotion summary
        shell: bash
        run: |
          {
            echo "## Website production candidate"
            echo ""
            echo "- Preview URL: ${{ steps.vars.outputs.preview_url }}"
            echo "- Preview run: ${{ steps.find-run.outputs.preview_run_id }}"
            echo "- Commit: ${{ github.event.pull_request.head.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Approve and deploy production
    needs: resolve-artifact
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_LINUX || '["ubuntu-latest"]') }}
    environment:
      name: website-production
      url: https://www.riddimsoftware.com/
    steps:
      - name: Check out riddim-release
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ vars.RIDDIM_RELEASE_REF || 'v1' }}
          token: ${{ secrets.RIDDIM_RELEASE_TOKEN }}
          path: .riddim-release

      - name: Download preview artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ needs.resolve-artifact.outputs.preview_run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --name "${{ needs.resolve-artifact.outputs.artifact_name }}" \
            --dir preview-artifact

      - name: Validate preview artifact
        shell: bash
        run: |
          set -euo pipefail
          python3 .riddim-release/scripts/website/validate_manifest.py \
            --manifest preview-artifact/website-preview-manifest.json \
            --artifact preview-artifact/site.zip \
            --pr-number "${{ github.event.pull_request.number }}" \
            --source-sha "${{ github.event.pull_request.head.sha }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_WEBSITE_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy production branch
        shell: bash
        run: |
          set -euo pipefail
          python3 .riddim-release/scripts/website/amplify_deploy.py \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch main \
            --artifact preview-artifact/site.zip \
            --stage PRODUCTION

      - name: Delete promoted preview branch
        shell: bash
        run: |
          set -euo pipefail
          python3 .riddim-release/scripts/website/amplify_delete_branch.py \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch "${{ needs.resolve-artifact.outputs.preview_branch }}"

      - name: Comment production deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "Approved preview was deployed to production from commit \`${{ github.event.pull_request.head.sha }}\`."
