name: Deploy to Amplify

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: amplify-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production site
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH: main
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist site.zip
          mkdir -p dist

          while IFS= read -r -d '' file; do
            case "$file" in
              .github/*|.gitignore|amplify.yml|customHttp.yml)
                continue
                ;;
            esac

            mkdir -p "dist/$(dirname "$file")"
            cp "$file" "dist/$file"
          done < <(git ls-files -z)

          cd dist
          zip -r ../site.zip .

      - name: Upload and start Amplify deployment
        shell: bash
        run: |
          set -euo pipefail

          deployment_json="$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH")"

          upload_url="$(jq -r '.zipUploadUrl' <<< "$deployment_json")"
          job_id="$(jq -r '.jobId' <<< "$deployment_json")"

          curl --fail --silent --show-error -X PUT -T site.zip "$upload_url"

          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "$job_id"

          for _ in {1..60}; do
            job_status="$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$job_id" \
              --query 'job.summary.status' \
              --output text)"

            echo "Amplify deployment status: $job_status"

            case "$job_status" in
              SUCCEED)
                exit 0
                ;;
              FAILED|CANCELLED)
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "Timed out waiting for Amplify deployment $job_id" >&2
          exit 1
