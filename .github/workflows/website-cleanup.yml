name: Website Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  cleanup:
    if: ${{ github.event.pull_request.merged == false && github.event.pull_request.head.repo.full_name == github.repository }}
    name: Delete preview branch
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_LINUX || '["ubuntu-latest"]') }}
    environment: website-preview
    steps:
      - name: Check out riddim-release
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ vars.RIDDIM_RELEASE_REF || 'v1' }}
          token: ${{ secrets.RIDDIM_RELEASE_TOKEN }}
          path: .riddim-release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_WEBSITE_PREVIEW_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Delete preview branch
        shell: bash
        run: |
          set -euo pipefail
          python3 .riddim-release/scripts/website/amplify_delete_branch.py \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch "pr-${{ github.event.pull_request.number }}"

      - name: Comment cleanup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "Deleted website preview branch \`pr-${{ github.event.pull_request.number }}\`."
