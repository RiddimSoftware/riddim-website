<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddim Software</title>
  <link rel="stylesheet" href="default.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#1c2d42">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#fbfaf7">
  <style>
    /* CSS for the website */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--color-bg);
      color: var(--color-fg);
    }
    header {
      background-color: var(--color-bg-alt);
      color: var(--color-fg);
      text-align: center;
      padding: 25px 0;
    }
    section {
      padding: 50px;
      text-align: center;
    }
    footer {
      background-color: var(--color-fg);
      color: var(--color-bg);
      text-align: center;
      padding: 20px 0;
    }
    img.app_store_icon {
      width: 96px;
      height: 96px;
      border-radius: 23%;
    }
    span.app_store_icon {
      display: block;
    }
    div.app_store_app {
      display: inline;
      padding: 0px 10px;
    }
    div.app_store_app_container {
      vertical-align: top;
      display: inline-block;
      text-align: center;
    }
    div.app_store_app > a {
      text-decoration: none;
      color: var(--color-bg);
    }
    div.app_store_app > a:visited {
      text-decoration: none;
      color: var(--color-bg);
    }
    @media screen and (min-width: 1000px) {
      a.app_store {
        filter: grayscale();
      }
      a.app_store:hover {
        filter: none;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Reach Privacy Policy</h1>
    <p>Reach does not collect any information about its users. The addresses you enter into the app are stored on your phone and never sent to Riddim Software.</p>
  </header>
  <section>
    <h2>Contact Us</h2>
    <a href="mailto: info@riddimsoftware.com">info@riddimsoftware.com</a>
  </section>

  </footer>
</body>
